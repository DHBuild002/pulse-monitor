[build]
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/live"
  to = "/live.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/index.html"
  status = 200
